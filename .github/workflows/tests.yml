name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # O core e stdlib puro; numpy+pedalboard cobrem os testes de DSP/QA/render.
      # Nenhum modelo Piper e baixado: os testes usam mock/formante.
      - name: Instala deps de teste
        run: pip install numpy pedalboard
      - name: Roda a suite
        run: python -m unittest discover -s tests -v
